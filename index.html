<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Schedule System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <button id="btn-menu" class="menu-btn">☰</button>
    <div class="brand">
      <span class="brand-title">Schedule</span>
      <span class="brand-sub">University Planner</span>
    </div>
  </div>
</header>

<aside class="sidebar">
  <div class="sidebar-header">
    <h2>Panel</h2>
  </div>
  <nav>
    <a href="#carga">Carga</a>
    <a href="#asignacion">Asignación</a>
    <a href="#generacion">Generar</a>
    <a href="#vista">Vista</a>
  </nav>
</aside>

<main class="content">
  <div class="view active" id="principal-view">

    <!-- SECCIONES EXACTAMENTE IGUAL QUE LAS TUYAS -->
    <!-- NO CAMBIO IDs NI ESTRUCTURA INTERNA -->
    
    <!-- Solo envolvemos mejor visualmente -->

    <section class="panel" id="carga">
      <h3>Carga de Clases</h3>
      <div class="row-3">
        <div>
          <label>Coordinación</label>
          <select id="carga-coordinacion" class="js-coordinacion"></select>
        </div>
        <div>
          <label>Carrera</label>
          <select id="carga-carrera" class="js-carrera"></select>
        </div>
        <div>
          <label>Turno</label>
          <select id="carga-turno" class="js-turno"></select>
        </div>
      </div>

      <div class="file-row">
        <input id="csv-input" type="file" accept=".csv">
        <button id="btn-importar-csv" class="btn-primary">Importar CSV</button>
      </div>

      <p class="hint" id="carga-hint"></p>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Coordinación</th>
              <th>Carrera</th>
              <th>Clase</th>
              <th>Aula</th>
              <th>Características</th>
              <th>Docente</th>
              <th>Área</th>
            </tr>
          </thead>
          <tbody id="clases-tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel" id="generacion">
      <h3>Generación Automática</h3>
      <div class="row-3">
        <div><label>Coordinación</label><select class="js-coordinacion"></select></div>
        <div><label>Carrera</label><select id="generacion-carrera" class="js-carrera"></select></div>
        <div><label>Turno</label><select id="generacion-turno" class="js-turno"></select></div>
      </div>

      <div class="btn-row">
        <button id="btn-generar-auto" class="btn-dark">Generar</button>
        <button id="btn-reiniciar-demo" class="btn-outline">Reiniciar</button>
      </div>

      <div id="generacion-console" class="console"></div>
    </section>

    <section class="panel" id="vista">
      <h3>Vista de Horario</h3>
      <div class="row-3">
        <div><label>Coordinación</label><select class="js-coordinacion"></select></div>
        <div><label>Carrera</label><select class="js-carrera"></select></div>
        <div><label>Turno</label><select id="vista-turno" class="js-turno"></select></div>
      </div>

      <div class="table-container">
        <table id="vista-table">
          <thead id="vista-thead"></thead>
          <tbody id="vista-tbody"></tbody>
        </table>
      </div>
    </section>

  </div>

  <div class="view" id="config-view"></div>
</main>

<footer class="bottom-tabs">
  <button class="tab active" data-tab="principal">Principal</button>
  <button class="tab" data-tab="config">Configuración</button>
</footer>

<script src="app.js"></script>
</body>
</html>
